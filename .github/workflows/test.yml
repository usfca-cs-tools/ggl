name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python >= 3.10. The 3.10 leg also exercises the tomli
        # fallback in tests/test_circuits.py (tomllib is stdlib only on 3.11+).
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package with test dependencies
      run: pip install -e ".[test]"

    - name: Run pytest
      run: pytest
